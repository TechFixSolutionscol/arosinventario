<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff00ff", // Neon Magenta
                        "secondary": "#00f3ff", // Electric Cyan/Teal
                        "accent": "#9d00ff", // Electric Purple
                        "background-dark": "#0d0221", // Deep Space Navy
                        "panel-dark": "#1a0b2e", // Lighter synthwave purple/dark
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                background-image: 
                    linear-gradient(rgba(13, 2, 33, 0.9), rgba(13, 2, 33, 0.9)),
                    repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(255, 0, 255, 0.05) 1px, rgba(255, 0, 255, 0.05) 2px),
                    repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(0, 243, 255, 0.05) 1px, rgba(0, 243, 255, 0.05) 2px);
                background-size: cover, 100% 4px, 4px 100%;
            }
        }
        .glow-magenta { box-shadow: 0 0 15px rgba(255, 0, 255, 0.4); }
        .glow-cyan { box-shadow: 0 0 15px rgba(0, 243, 255, 0.4); }
        .glitch-filter {
            filter: contrast(120%) saturate(150%) hue-rotate(-10deg);
            position: relative;
        }
        .glitch-filter::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(255,0,255,0.1), transparent 50%, rgba(0,243,255,0.1));
            pointer-events: none;
        }
    </style>
    <title>FixOps POS Dashboard - Synthwave Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        // Verificar sesión antes de renderizar
        if (!window.InvAuth || !window.InvAuth.currentUser()) {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body class="bg-background-dark font-display text-slate-100 antialiased min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <aside
            class="w-64 flex-shrink-0 bg-panel-dark/80 border-r border-primary/20 flex flex-col h-full backdrop-blur-md">
            <div class="p-6 flex items-center gap-3">
                <div
                    class="size-10 rounded-xl bg-gradient-to-br from-primary to-accent flex items-center justify-center text-white shadow-[0_0_20px_rgba(255,0,255,0.5)]">
                    <span class="material-symbols-outlined font-bold">build</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold leading-tight tracking-tight text-white uppercase italic">FixOps</h1>
                    <p class="text-[10px] text-secondary font-bold uppercase tracking-widest">Digital Nexus</p>
                </div>
            </div>
            <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
                <div class="pb-4">
                    <p class="px-3 text-[10px] font-bold text-primary/60 uppercase tracking-[0.2em] mb-4">Principal</p>

                    <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-primary/10 hover:text-primary transition-all"
                        href="index.html">
                        <span class="material-symbols-outlined text-xl">home</span>
                        <span class="text-sm font-medium">Principal</span>
                    </a>
                </div>
                <div class="pb-4">
                    <p class="px-3 text-[10px] font-bold text-primary/60 uppercase tracking-[0.2em] mb-4">Operaciones
                    </p>
                    <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/20 text-primary border border-primary/40 glow-magenta"
                        href="#">
                        <span class="material-symbols-outlined text-xl fill-1">point_of_sale</span>
                        <span class="text-sm font-medium tracking-wide">Operaciones POS</span>
                    </a>

                </div>



            </nav>
            <div class="p-4 border-t border-primary/10">
                <button id="btn_logout"
                    class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-rose-400 hover:bg-rose-500/10 transition-all italic font-bold">
                    <span class="material-symbols-outlined text-xl">logout</span>
                    <span class="text-sm font-medium">Cerrar Sesión</span>
                </button>
            </div>
        </aside>
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="p-6 bg-panel-dark/40 border-b border-primary/20 space-y-4 backdrop-blur-md">
                <div class="flex items-center justify-between gap-6">
                    <div class="relative flex-1 max-w-2xl">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-secondary/70">search</span>
                        <input id="search_input"
                            class="w-full bg-background-dark/80 border-primary/30 rounded-xl pl-12 pr-4 py-3 focus:ring-primary focus:border-primary text-white placeholder:text-slate-600 shadow-inner"
                            placeholder="Search products, services or scan barcode..." type="text" />
                    </div>
                    <div class="flex items-center gap-3">
                        <button
                            class="p-3 rounded-xl bg-background-dark border border-primary/30 text-primary hover:bg-primary hover:text-white glow-magenta transition-all">
                            <span class="material-symbols-outlined">notifications</span>
                        </button>
                        <div id="btn_back"
                            class="flex items-center gap-3 pl-3 border-l border-primary/20 cursor-pointer"
                            title="Volver a Inventario">
                            <div class="text-right hidden sm:block">
                                <p id="pos_user_name" class="text-sm font-bold text-white tracking-wide">Usuario</p>
                                <p id="pos_user_role"
                                    class="text-[10px] text-secondary uppercase font-black italic tracking-tighter">Rol
                                </p>
                            </div>
                            <div
                                class="size-10 rounded-full bg-slate-800 border-2 border-primary glow-magenta flex items-center justify-center text-white">
                                <span class="material-symbols-outlined font-bold">person</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="categories_container" class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                    <button
                        class="px-5 py-2 rounded-lg bg-secondary text-background-dark font-black text-sm whitespace-nowrap glow-cyan uppercase italic">All
                        Items</button>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-6 bg-background-dark/20">
                <div id="products_container"
                    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
            </div>
        </main>
        <aside
            class="w-96 flex-shrink-0 bg-panel-dark border-l border-primary/30 flex flex-col h-full shadow-[0_0_50px_rgba(0,0,0,0.5)] z-10">
            <div class="p-6 border-b border-primary/20 flex items-center justify-between bg-background-dark/30">
                <div>
                    <h2 class="text-lg font-black text-white italic uppercase tracking-wider">Current Order</h2>
                    <p class="text-xs text-secondary/80 font-bold tracking-widest">ORDER #FX-4920</p>
                </div>
                <button id="btn_clear_cart" class="p-2 rounded-lg text-rose-500 hover:bg-rose-500/10 transition-all">
                    <span class="material-symbols-outlined">delete_sweep</span>
                </button>
            </div>
            <div id="cart_items_container" class="flex-1 overflow-y-auto p-6 space-y-4 bg-[rgba(255,0,255,0.02)]">
                <div class="text-center p-10 text-slate-500 italic border border-dashed border-primary/20 rounded-xl">🛒
                    Carrito vacío</div>
            </div>
            <div class="p-6 bg-background-dark/60 border-t border-primary/30 space-y-3">
                <div class="flex justify-between text-sm">
                    <span class="text-slate-400 font-medium">Subtotal</span>
                    <span id="cart_subtotal" class="font-black text-white">$0</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-400 font-medium">Tax (0%)</span>
                    <span id="cart_tax" class="font-black text-white">$0</span>
                </div>
                <div class="flex justify-between text-xl pt-3 border-t border-primary/20">
                    <span class="font-black text-white italic">TOTAL</span>
                    <span id="cart_total" class="font-black text-secondary glow-cyan">$0</span>
                </div>
                <div class="grid grid-cols-2 gap-3 pt-4">
                    <button data-method="Efectivo"
                        class="btn-pay-method flex flex-col items-center justify-center gap-1 py-3 rounded-xl bg-primary/20 border border-primary text-primary hover:border-primary hover:text-primary transition-all group glow-magenta active">
                        <span class="material-symbols-outlined group-hover:glow-magenta">payments</span>
                        <span class="text-[10px] font-black uppercase tracking-wider">Efectivo</span>
                    </button>
                    <button data-method="Tarjeta"
                        class="btn-pay-method flex flex-col items-center justify-center gap-1 py-3 rounded-xl bg-background-dark border border-primary/30 text-slate-400 hover:border-primary hover:text-primary transition-all group">
                        <span class="material-symbols-outlined">credit_card</span>
                        <span class="text-[10px] font-black uppercase tracking-wider">Tarjeta</span>
                    </button>
                </div>
                <button id="btn_process_payment"
                    class="w-full mt-4 py-4 rounded-xl bg-secondary text-background-dark font-black text-lg shadow-[0_0_25px_rgba(0,243,255,0.4)] hover:brightness-110 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3 uppercase italic">
                    Process Payment
                    <span class="material-symbols-outlined font-black">arrow_forward</span>
                </button>
            </div>
        </aside>
    </div>

    <script src="pos.js"></script>

    <!-- ===== MODAL DE COBRO ===== -->
    <div id="modal_cobro" style="display:none;"
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm">
        <div class="bg-panel-dark border border-primary/40 rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6 space-y-5">
            <div class="flex items-center justify-between">
                <h3 class="text-xl font-black text-white uppercase italic tracking-wider">💳 Cobro</h3>
                <button onclick="document.getElementById('modal_cobro').style.display='none'"
                    class="text-slate-400 hover:text-white transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <!-- Cliente -->
            <div>
                <label class="text-xs text-secondary uppercase font-black tracking-widest mb-2 block">Cliente</label>
                <input id="cobro_cliente" list="cobro_clientes_list" type="text" placeholder="Consumidor Final"
                    class="w-full bg-background-dark border border-primary/30 rounded-xl px-4 py-3 text-white placeholder:text-slate-600 focus:border-primary focus:outline-none transition-all">
                <datalist id="cobro_clientes_list"></datalist>
            </div>

            <!-- Total -->
            <div class="bg-background-dark/60 rounded-xl p-4 text-center border border-secondary/30">
                <p class="text-xs text-slate-400 uppercase font-bold tracking-widest mb-1">Total a Cobrar</p>
                <p id="cobro_total_display" class="text-4xl font-black text-secondary glow-cyan">$0</p>
            </div>

            <!-- Método de pago activo -->
            <div id="cobro_efectivo_section" class="space-y-3">
                <div>
                    <label class="text-xs text-secondary uppercase font-black tracking-widest mb-2 block">Efectivo
                        Recibido</label>
                    <input id="cobro_recibido" type="number" min="0" placeholder="0"
                        class="w-full bg-background-dark border border-primary/30 rounded-xl px-4 py-3 text-white text-xl font-black placeholder:text-slate-600 focus:border-primary focus:outline-none transition-all">
                </div>
                <!-- Atajos rápidos -->
                <div id="cobro_shortcuts" class="grid grid-cols-4 gap-2"></div>
                <!-- Cambio -->
                <div
                    class="flex justify-between items-center bg-background-dark/60 rounded-xl px-4 py-3 border border-primary/20">
                    <span class="text-sm text-slate-400 font-bold uppercase tracking-wider">Cambio</span>
                    <span id="cobro_cambio" class="text-2xl font-black text-green-400">$0</span>
                </div>
            </div>

            <!-- Notas -->
            <div>
                <label class="text-xs text-secondary uppercase font-black tracking-widest mb-2 block">Notas
                    (Opcional)</label>
                <input id="cobro_notas" type="text" placeholder="Nota de la venta..."
                    class="w-full bg-background-dark border border-primary/30 rounded-xl px-4 py-2 text-white placeholder:text-slate-600 focus:border-primary focus:outline-none transition-all text-sm">
            </div>

            <button id="btn_confirmar_cobro"
                class="w-full py-4 rounded-xl bg-secondary text-background-dark font-black text-lg shadow-[0_0_25px_rgba(0,243,255,0.4)] hover:brightness-110 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3 uppercase italic">
                <span class="material-symbols-outlined font-black">check_circle</span>
                Confirmar Venta
            </button>
        </div>
    </div>

    <!-- ===== TIRILLA DE IMPRESIÓN ===== -->
    <div id="ticket_print" style="display:none;"></div>

    <style>
        @media print {
            body>*:not(#ticket_print) {
                display: none !important;
            }

            #ticket_print {
                display: block !important;
                width: 80mm;
                margin: 0;
                padding: 0;
                font-family: 'Courier New', monospace;
                font-size: 12px;
                color: #000;
                background: #fff;
            }

            #ticket_print * {
                color: #000 !important;
                background: transparent !important;
            }
        }
    </style>
</body>

</html>
